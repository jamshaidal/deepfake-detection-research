# Federated Learning Configuration
federated_learning:
  num_clients: 5
  rounds: 100
  client_epochs: 5
  batch_size: 32
  learning_rate: 0.001
  min_fit_clients: 3
  min_eval_clients: 3
  min_available_clients: 3

# Model Configuration
model:
  name: "DeepfakeDetectionCNN"
  input_size: [3, 224, 224]
  num_classes: 2
  dropout_rate: 0.5

# Data Configuration
data:
  data_dir: "./data"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  image_size: 224
  augmentation: true

# Training Configuration
training:
  device: "cuda"
  num_workers: 4
  pin_memory: true
  save_model_path: "./models"
  log_dir: "./logs"

# Server Configuration
server:
  host: "localhost"
  port: 8080
  strategy: "FedAvg"